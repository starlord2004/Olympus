<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty Gateway — Olympus University</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container dark" id="loginContainer">
  <canvas class="particles-canvas" id="particlesCanvas"></canvas>
  <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
    <i class="fas fa-sun"></i>
  </button>

  <div class="login-card">
    <div class="login-card-inner">
      
      <a href="index.html" class="go-home-link">
        <i class="fas fa-arrow-left"></i> Back to University
      </a>

      <div class="login-header">
        <img src="logo.png" alt="Olympus Logo" style="width: 50px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.5); margin-bottom: 0.5rem">
        <h1>Faculty & Staff Gateway</h1>
        <p>Access ERP, Payroll, and Academic Administration.</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-field" id="emailField">
          <input type="email" id="email" required autocomplete="off">
          <label for="email">Staff Email Address</label>
          <span class="error-message" id="emailError" style="display:none">Please enter a valid institution email</span>
        </div>

        <div class="form-field" id="passwordField">
          <input type="password" id="password" required>
          <label for="password">Password</label>
          <button type="button" class="toggle-password" id="togglePassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox">
            Remember me
          </label>
          <a href="#" class="forgot-password">Security Center</a>
        </div>

        <button type="submit" class="login-button" id="submitBtn" disabled>Authenticate</button>
      </form>

      <div class="separator">
        <span>Restricted Access</span>
      </div>

      <p class="signup-prompt">
        Having trouble? <a href="#">Contact IT Helpdesk</a>
      </p>

    </div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
